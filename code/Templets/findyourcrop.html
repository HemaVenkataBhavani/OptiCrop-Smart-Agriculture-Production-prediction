<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Crop</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="crop-page">

    <div class="form-container">

        <h1>🌾 Crop Recommendation System</h1>

        <form action="/predict" method="POST">

            <input type="number" name="Nitrogen" placeholder="Nitrogen (N)" required>

            <input type="number" name="Phosphorus" placeholder="Phosphorus (P)" required>

            <input type="number" name="Potassium" placeholder="Potassium (K)" required>

            <input type="number" step="0.01" name="Temperature" placeholder="Temperature (°C)" required>

            <input type="number" step="0.01" name="Humidity" placeholder="Humidity (%)" required>

            <input type="number" step="0.01" name="pH" placeholder="pH Value" required>

            <input type="number" step="0.01" name="Rainfall" placeholder="Rainfall (mm)" required>

            <button type="submit">
                🌱 Predict Crop
            </button>

        </form>

        <h2>{{ prediction_text }}</h2>

        <a href="/" class="home-btn">
            🏠 Go To Home Page
        </a>

    </div>

</body>
</html>
