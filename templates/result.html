<!DOCTYPE html>
<html>

<head>

    <title>Crop Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body class="crop-page">

<div class="result-card">

    <h1>🌾 Recommended Crop</h1>

    <img
    src="{{ url_for('static',
    filename='images/' + image) }}"
    class="crop-image">

    <h2>{{ crop }}</h2>

    <h3>
        తెలుగు:
        {{ telugu_crop }}
    </h3>

    <a href="/findyourcrop"
       class="home-btn">
       🔄 Predict Again
    </a>

    <a href="/"
       class="home-btn">
       🏠 Home
    </a>

</div>

</body>

</html>
